<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>辽宁中医嘉和医院 · 定点自查可视化系统</title>
<style>
:root {
  --primary: #1a5276;
  --primary-light: #2980b9;
  --gold: #b8860b;
  --gold-light: #f0c75e;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #2c3e50;
  --text-secondary: #5a6c7d;
  --border: #dce3ea;
  --success: #27ae60;
  --danger: #e74c3c;
  --warning: #f39c12;
  --info: #2980b9;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--primary-light);text-decoration:none}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,var(--primary),#0d3b5c);color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.15)}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{font-size:28px}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.header-sub{font-size:12px;opacity:0.8}
.header-right{display:flex;align-items:center;gap:12px}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:var(--transition);display:inline-flex;align-items:center;gap:6px}
.btn-outline{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.btn-outline:hover{background:rgba(255,255,255,0.25)}
.btn-primary{background:var(--gold);color:#1a1a1a;font-weight:600}
.btn-primary:hover{background:var(--gold-light)}
.btn-sm{padding:5px 12px;font-size:12px}
.progress-mini{display:flex;align-items:center;gap:8px;color:#fff;font-size:13px}
.progress-mini-bar{width:100px;height:6px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden}
.progress-mini-fill{height:100%;background:var(--gold-light);border-radius:3px;transition:width 0.4s}

/* ===== TAB BAR ===== */
.tab-bar{display:flex;background:var(--card);border-bottom:2px solid var(--border);padding:0 32px;position:sticky;top:72px;z-index:99;gap:0}
.tab-btn{flex:1;max-width:320px;padding:14px 24px;border:none;background:none;cursor:pointer;font-size:15px;font-weight:500;color:var(--text-secondary);border-bottom:3px solid transparent;transition:var(--transition);position:relative;white-space:nowrap}
.tab-btn:hover{color:var(--primary);background:#f8fafc}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.tab-badge{display:inline-block;background:var(--primary);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}

/* ===== LAYOUT ===== */
.app-layout{display:flex;min-height:calc(100vh - 140px)}
.sidebar{width:240px;min-width:240px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:124px;height:calc(100vh - 124px);overflow-y:auto;transition:var(--transition)}
.sidebar-title{font-size:12px;text-transform:uppercase;color:var(--text-secondary);padding:0 20px 12px;letter-spacing:1px}
.sidebar-nav{list-style:none}
.sidebar-nav a{display:block;padding:10px 20px;font-size:13px;color:var(--text-secondary);border-left:3px solid transparent;transition:var(--transition)}
.sidebar-nav a:hover,.sidebar-nav a.active{color:var(--primary);background:#f0f7ff;border-left-color:var(--primary)}
.main-content{flex:1;padding:24px 32px;max-width:1100px;overflow-y:auto}
.main-content section{margin-bottom:40px;scroll-margin-top:140px}

/* ===== CARDS ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px;transition:var(--transition)}
.card:hover{box-shadow:var(--shadow-hover)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:17px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:22px}
.card-badge{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600}
.badge-info{background:#eaf4fd;color:var(--info)}
.badge-warning{background:#fef9e7;color:var(--warning)}
.badge-success{background:#eafaf1;color:var(--success)}
.badge-danger{background:#fdedec;color:var(--danger)}

/* ===== FLOWCHART ===== */
.flow-steps{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:16px 0;overflow-x:auto}
.flow-step{flex:1;min-width:140px;text-align:center;position:relative;cursor:pointer}
.flow-step-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 12px;transition:var(--transition);position:relative}
.flow-step-card:hover{border-color:var(--primary-light);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.flow-step-num{display:inline-block;width:32px;height:32px;line-height:32px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;font-size:14px;margin-bottom:8px}
.flow-step.active .flow-step-card{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,0.15)}
.flow-step.active .flow-step-num{background:var(--gold);color:#1a1a1a}
.flow-step-title{font-weight:700;font-size:14px;margin-bottom:4px}
.flow-step-desc{font-size:12px;color:var(--text-secondary)}
.flow-arrow{display:flex;align-items:center;padding-top:28px;font-size:20px;color:var(--primary-light);flex-shrink:0}
.flow-detail{display:none;padding:16px;margin-top:12px;background:#f8fafc;border-radius:8px;font-size:13px}
.flow-detail.open{display:block}
.flow-detail ul{list-style:none;padding:0}
.flow-detail li{padding:4px 0;padding-left:16px;position:relative}
.flow-detail li::before{content:'•';position:absolute;left:0;color:var(--primary-light)}

/* ===== ORG CHART ===== */
.org-chart{text-align:center;padding:20px 0}
.org-node{display:inline-block;background:var(--primary);color:#fff;padding:10px 24px;border-radius:8px;font-weight:700;margin-bottom:12px;font-size:14px}
.org-arrow{color:var(--primary-light);font-size:20px;margin:4px 0}
.org-row{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:8px 0}
.org-dept{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;min-width:100px;text-align:center;transition:var(--transition)}
.org-dept:hover{border-color:var(--primary-light);background:#f0f7ff}
.org-dept-name{font-weight:600;color:var(--primary)}
.org-dept-role{font-size:11px;color:var(--text-secondary);margin-top:2px}

/* ===== TRIPLE CHECK ===== */
.triple-check{display:flex;align-items:center;justify-content:center;gap:20px;padding:20px;flex-wrap:wrap}
.tc-box{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-align:center;min-width:120px;font-weight:600;font-size:14px}
.tc-center{text-align:center}
.tc-match{font-size:24px;font-weight:900;color:var(--primary);margin:8px 0}
.tc-result{display:flex;gap:12px;margin-top:8px}
.tc-pass{background:#eafaf1;color:var(--success);padding:8px 16px;border-radius:6px;font-weight:600}
.tc-fail{background:#fdedec;color:var(--danger);padding:8px 16px;border-radius:6px;font-weight:600}

/* ===== CHECKLIST ===== */
.checklist{margin:0;padding:0;list-style:none}
.checklist li{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:6px;transition:var(--transition);cursor:pointer;border:1px solid transparent}
.checklist li:hover{background:#f8fafc;border-color:var(--border)}
.checklist li.checked{background:#f0faf4}
.checklist li.checked .cl-label{color:var(--success)}
.cl-cb{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid #bdc3c7;border-radius:4px;flex-shrink:0;cursor:pointer;transition:var(--transition);position:relative;top:1px}
.cl-cb:checked{background:var(--success);border-color:var(--success)}
.cl-cb:checked::after{content:'✓';position:absolute;top:-1px;left:4px;color:#fff;font-weight:700;font-size:14px}
.cl-label{font-size:13px;flex:1}
.cl-note{font-size:11px;color:var(--text-secondary);margin-left:auto;flex-shrink:0}

/* ===== ACCORDION ===== */
.accordion{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.accordion-header{padding:14px 20px;background:#f8fafc;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px;transition:var(--transition);user-select:none}
.accordion-header:hover{background:#eef3f8}
.accordion-header .arrow{transition:var(--transition);font-size:12px}
.accordion-header.open .arrow{transform:rotate(180deg)}
.accordion-body{display:none;padding:16px 20px;border-top:1px solid var(--border)}
.accordion-body.open{display:block}

/* ===== DO-DONT CARDS ===== */
.do-dont-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.do-dont-grid{grid-template-columns:1fr}}
.do-card,.dont-card{border-radius:var(--radius);overflow:hidden}
.do-card{border:2px solid var(--success)}
.dont-card{border:2px solid var(--danger)}
.do-card-header{padding:12px 16px;background:#eafaf1;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.dont-card-header{padding:12px 16px;background:#fdedec;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.do-card-body,.dont-card-body{padding:8px 16px}
.do-item,.dont-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer}
.do-item:hover{background:#f0faf4;margin:0 -16px;padding:10px 16px}
.dont-item:hover{background:#fef5f5;margin:0 -16px;padding:10px 16px}
.do-item-num,.dont-item-num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;font-size:11px;font-weight:700;margin-right:8px}
.do-item-num{background:var(--success);color:#fff}
.dont-item-num{background:var(--danger);color:#fff}
.do-item-expand,.dont-item-expand{display:none;margin-top:6px;padding:10px 14px;background:#fff;border-radius:6px;font-size:12px;color:var(--text-secondary);border-left:3px solid var(--primary-light)}
.do-item-expand.show,.dont-item-expand.show{display:block}

/* ===== SCENARIO CARDS ===== */
.scenario-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:var(--transition)}
.scenario-card:hover{border-color:var(--primary-light)}
.scenario-header{padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#fff;font-weight:600;font-size:14px;user-select:none}
.scenario-header:hover{background:#f8fafc}
.scenario-num{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;background:var(--warning);color:#fff;border-radius:50%;font-size:12px;font-weight:700;margin-right:10px;flex-shrink:0}
.scenario-body{display:none;padding:20px;border-top:1px solid var(--border);background:#fafbfc}
.scenario-body.open{display:block}
.scenario-q{background:#fef9e7;border-left:4px solid var(--warning);padding:12px 16px;border-radius:0 6px 6px 0;margin-bottom:14px;font-weight:600;font-size:13px}
.scenario-a{background:#eafaf1;border-left:4px solid var(--success);padding:14px 16px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.8}

/* ===== TIMELINE ===== */
.timeline{position:relative;padding:10px 0 10px 32px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:3px;background:var(--border);border-radius:2px}
.tl-item{position:relative;margin-bottom:24px;padding-left:16px}
.tl-item::before{content:'';position:absolute;left:-28px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--primary);border:3px solid #fff;box-shadow:0 0 0 2px var(--primary)}
.tl-item.done::before{background:var(--success);box-shadow:0 0 0 2px var(--success)}
.tl-title{font-weight:700;font-size:15px;margin-bottom:4px}
.tl-desc{font-size:13px;color:var(--text-secondary)}
.tl-tag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;margin-bottom:6px;font-weight:600}
.tl-tag.day{background:#eaf4fd;color:var(--info)}
.tl-tag.week{background:#fef9e7;color:var(--warning)}
.tl-tag.month{background:#f5eef8;color:#8e44ad}
.tl-tag.ongoing{background:#eafaf1;color:var(--success)}

/* ===== ALERT BANNER ===== */
.alert{padding:16px 20px;border-radius:8px;margin-bottom:16px;font-size:13px;display:flex;align-items:flex-start;gap:10px;line-height:1.7}
.alert-warning{background:#fef9e7;border:1px solid #f9e79f}
.alert-danger{background:#fdedec;border:1px solid #f5b7b1}
.alert-info{background:#eaf4fd;border:1px solid #aed6f1}
.alert-icon{font-size:20px;flex-shrink:0}

/* ===== STATS ROW ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:32px;font-weight:800;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-top:4px}
.stat-card.success .stat-num{color:var(--success)}
.stat-card.warning .stat-num{color:var(--warning)}
.stat-card.danger .stat-num{color:var(--danger)}

/* ===== FOOTER ===== */
.footer{text-align:center;padding:24px;color:var(--text-secondary);font-size:12px;border-top:1px solid var(--border);background:var(--card)}

/* ===== QUICK REF CARD ===== */
.quick-ref{background:linear-gradient(135deg,#fef9e7,#fdf2d0);border:2px solid var(--gold);border-radius:var(--radius);padding:20px 24px}
.quick-ref h3{color:var(--gold);margin-bottom:12px}
.quick-ref .formula{font-size:16px;font-weight:700;color:var(--primary);text-align:center;padding:10px;background:rgba(255,255,255,0.6);border-radius:6px;margin-bottom:12px}

/* ===== REPORT TEMPLATE ===== */
.report-box{background:#fafbfc;border:2px dashed var(--border);border-radius:var(--radius);padding:24px;font-family:"SimSun","KaiTi",serif}
.report-box h3{text-align:center;font-size:18px;margin-bottom:16px}
.report-box .stamp{text-align:right;margin-top:20px;font-weight:600}

/* ===== KNOWLEDGE CONSENT TEMPLATE ===== */
.consent-box{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:24px;font-size:13px}
.consent-box h3{text-align:center;font-size:16px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--primary)}
.consent-box .sig-line{display:flex;justify-content:space-between;margin-top:20px;padding-top:12px;border-top:1px solid var(--border)}

/* ===== PRINT ===== */
@media print{
  .header,.tab-bar,.sidebar,.btn,.footer,.flow-arrow{display:none!important}
  .app-layout{display:block}
  .main-content{padding:0;max-width:100%}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;page-break-inside:avoid}
  .accordion-body,.flow-detail,.scenario-body{display:block!important}
  .accordion-header,.scenario-header{cursor:default}
  body{font-size:12px}
  section{page-break-before:always}
  section:first-of-type{page-break-before:avoid}
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .sidebar{position:fixed;left:-260px;top:124px;z-index:90;height:calc(100vh - 124px);box-shadow:4px 0 20px rgba(0,0,0,0.15)}
  .sidebar.open{left:0}
  .main-content{padding:16px}
  .header{padding:12px 16px}
  .tab-bar{padding:0 8px}
  .tab-btn{padding:12px 12px;font-size:13px}
  .flow-steps{flex-direction:column;align-items:stretch}
  .flow-arrow{transform:rotate(90deg);padding:0;justify-content:center}
}
@media(max-width:600px){
  .header h1{font-size:15px}
  .header-logo{font-size:22px}
  .do-dont-grid{grid-template-columns:1fr}
  .triple-check{flex-direction:column}
  .stats-row{grid-template-columns:1fr 1fr}
}

/* ===== MOBILE MENU TOGGLE ===== */
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px}
@media(max-width:900px){.menu-toggle{display:block}}

/* ===== TAB CONTENT ===== */
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== TOOLTIP / HELPER ===== */
.section-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.section-progress-bar{width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.section-progress-fill{height:100%;background:var(--success);border-radius:3px;transition:width 0.4s}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-left">
    <span class="header-logo">🏥</span>
    <div>
      <h1>辽宁中医嘉和医院 · 定点自查可视化系统</h1>
      <div class="header-sub">医保合规自查自纠 · 穴位埋线门诊自查</div>
    </div>
  </div>
  <div class="header-right">
    <div class="progress-mini">
      <span>📋 总进度</span>
      <div class="progress-mini-bar"><div class="progress-mini-fill" id="globalProgressFill" style="width:0%"></div></div>
      <span id="globalProgressText">0%</span>
    </div>
    <button class="btn btn-outline btn-sm" onclick="resetAll()" title="重置所有勾选">🔄 重置</button>
    <button class="btn btn-outline btn-sm" onclick="window.print()" title="打印当前文档">🖨️ 打印</button>
    <button class="btn btn-primary btn-sm" onclick="expandAll()">📖 全部展开</button>
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  </div>
</header>

<!-- ===== TAB BAR ===== -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="doc1" onclick="switchTab('doc1')">📊 医保迎检自查流程<span class="tab-badge">9大模块</span></button>
  <button class="tab-btn" data-tab="doc2" onclick="switchTab('doc2')">💉 穴位埋线门诊自查<span class="tab-badge">11章</span></button>
</nav>

<!-- ===== LAYOUT ===== -->
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">📑 文档导航</div>
    <ul class="sidebar-nav" id="sidebarNav"></ul>
  </aside>

  <main class="main-content" id="mainContent">
    <!-- Content filled by JS -->
  </main>
</div>

<footer class="footer">
  辽宁中医嘉和医院 医保办公室 · 版本 V1.0 · 2025年6月编制 · 依据国家医保局医保函〔2025〕2号及辽宁省医保局相关文件
</footer>

<script>
// ============================================================
// DATA: Document 1 - 医保迎检自查
// ============================================================
const DOC1 = {
  id: 'doc1',
  title: '医保迎检自查流程',
  sections: []
};

// Helper to build data structure inline
(function buildDoc1() {
  // Section 1: 迎检全流程
  DOC1.sections.push({
    id: 'flow',
    title: '📊 迎检全流程可视化',
    icon: '🔄',
    render: () => `
      <div class="card">
        <div class="card-header"><span class="card-title"><span class="icon">🔄</span>五阶迎检全流程</span></div>
        <div class="flow-steps">
          ${['1.飞检前自查','2.飞检组入场','3.现场应对','4.检查收尾','5.整改闭环'].map((t,i,a)=>

          <div class="tl-item done"><span class="tl-tag month">2月-3月</span><div class="tl-title">定点机构自查自纠+退费</div></div>
          <div class="tl-item"><span class="tl-tag month">8月-11月</span><div class="tl-title">辽宁省密集发布中医类价格规范</div><div class="tl-desc">辽医保发〔2025〕36号/63号等</div></div>
          <div class="tl-item"><span class="tl-tag ongoing">4月起持续</span><div class="tl-title">飞检持续常态化</div></div>
        </div>
        <div class="alert alert-warning" style="margin-top:8px">
          <span class="alert-icon">⚠️</span>
          <div><strong>重点关注：</strong>中医特殊疗法类（含穴位埋线）价格项目统一映射 · 按"次·日"收费已强制执行，旧版按穴位收费模式全面废止</div>
        </div>
      </div>
    `
  });
})();

// ============================================================
// RENDER HELPERS
// ============================================================
function renderCheckItem(id, label) {
  return `<li id="li-${id}" class="checklist-item" onclick="toggleCheck('${id}')">
    <input type="checkbox" class="cl-cb" id="cb-${id}" onclick="event.stopPropagation();toggleCheck('${id}')">
    <span class="cl-label">${label}</span>
  </li>`;
}

// ============================================================
// STATE
// ============================================================
let currentTab = 'doc1';
let currentDoc = DOC1;

function getStorageKey(id) { return `cc-switch-${id}`; }

function isChecked(id) { return localStorage.getItem(getStorageKey(id)) === 'true'; }

function setChecked(id, val) {
  if(val) localStorage.setItem(getStorageKey(id), 'true');
  else localStorage.removeItem(getStorageKey(id));
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleCheck(id) {
  const newVal = !isChecked(id);
  setChecked(id, newVal);
  updateCheckUI(id);
  updateAllProgress();
}

function updateCheckUI(id) {
  const li = document.getElementById('li-'+id);
  const cb = document.getElementById('cb-'+id);
  if(!li || !cb) return;
  const checked = isChecked(id);
  cb.checked = checked;
  li.classList.toggle('checked', checked);
}

function updateAllProgress() {
  // Update all section progresses
  const allCBs = document.querySelectorAll('.cl-cb');
  allCBs.forEach(cb => {
    const id = cb.id.replace('cb-','');
    updateCheckUI(id);
  });

  // Calculate per-section progress
  document.querySelectorAll('[id^="prog-"]').forEach(el => {
    const sectionId = el.id.replace('prog-','');
    if(sectionId === 'global') return;
    updateSectionProgress(sectionId);
  });

  // Global progress
  const total = allCBs.length;
  const checked = [...allCBs].filter(cb => isChecked(cb.id.replace('cb-',''))).length;
  const pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById('globalProgressFill').style.width = pct+'%';
  document.getElementById('globalProgressText').textContent = pct+'% ('+checked+'/'+total+')';

  // Monthly stats for doc2
  updateMonthlyStats();
}

function updateSectionProgress(sectionId) {
  const prefix = sectionId; // e.g. 'dept-check' or 'mt-qual'
  const allCBs = document.querySelectorAll('.cl-cb');
  let total = 0, checked = 0;
  // Find the section progress element
  const fillEl = document.getElementById('prog-'+sectionId);
  const textEl = document.getElementById('prog-'+sectionId+'-text');
  if(!fillEl || !textEl) return;
  // Find the parent card/section
  const card = fillEl.closest('.card');
  if(!card) return;
  const sectionCBs = card.querySelectorAll('.cl-cb');
  sectionCBs.forEach(cb => {
    total++;
    if(isChecked(cb.id.replace('cb-',''))) checked++;
  });
  const pct = total ? Math.round(checked/total*100) : 0;
  fillEl.style.width = pct+'%';
  textEl.textContent = pct+'% ('+checked+'/'+total+')';
}

function updateMonthlyStats() {
  const totalEl = document.getElementById('monthly-issue-count');
  const doneEl = document.getElementById('monthly-done-count');
  const pendingEl = document.getElementById('monthly-pending-count');
  if(!totalEl || !doneEl || !pendingEl) return;
  const monthlyCBs = document.querySelectorAll('[id^="cb-d2-monthly-"]');
  const total = monthlyCBs.length;
  const checked = [...monthlyCBs].filter(cb => isChecked(cb.id.replace('cb-',''))).length;
  totalEl.textContent = total - checked; // unchecked = issues
  doneEl.textContent = checked; // checked = resolved
  pendingEl.textContent = total - checked;
}

function toggleAccordion(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function toggleScenario(header) {
  header.parentElement.querySelector('.scenario-body').classList.toggle('open');
  header.querySelector('.arrow').classList.toggle('open');
}

function toggleFlowDetail(step) {
  step.querySelector('.flow-detail').classList.toggle('open');
  step.classList.toggle('active');
}

function expandAll() {
  document.querySelectorAll('.accordion-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.accordion-header').forEach(h => h.classList.add('open'));
  document.querySelectorAll('.scenario-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.flow-detail').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.flow-step').forEach(s => s.classList.add('active'));
}

function resetAll() {
  if(!confirm('确定要重置所有勾选记录吗？此操作不可撤销。')) return;
  const keys = [];
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k.startsWith('cc-switch-')) keys.push(k);
  }
  keys.forEach(k => localStorage.removeItem(k));
  updateAllProgress();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tabId) {
  currentTab = tabId;
  currentDoc = tabId === 'doc1' ? DOC1 : DOC2;
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  // Render
  renderCurrentDoc();
  // Update sidebar
  buildSidebar();
  // Restore checks
  updateAllProgress();
  // Scroll to top
  document.getElementById('mainContent').scrollTop = 0;
  window.scrollTo(0, 0);
}

function renderCurrentDoc() {
  const main = document.getElementById('mainContent');
  main.innerHTML = currentDoc.sections.map(s => `<section id="${s.id}"><h2 style="margin-bottom:12px;color:var(--primary);font-size:20px">${s.icon} ${s.title}</h2>${s.render()}</section>`).join('');
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = currentDoc.sections.map(s =>
    `<li><a href="#${s.id}" onclick="document.getElementById('sidebar').classList.remove('open')">${s.icon} ${s.title}</a></li>`
  ).join('');
}

// ============================================================
// INTERSECTION OBSERVER for sidebar highlight
// ============================================================
const sidebarObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      document.querySelectorAll('.sidebar-nav a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#'+entry.target.id);
      });
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });

function observeSections() {
  document.querySelectorAll('section[id]').forEach(s => sidebarObserver.observe(s));
}

// ============================================================
// INIT
// ============================================================
function init() {
  switchTab('doc1');
  observeSections();
}

document.addEventListener('DOMContentLoaded', init);

// Re-observe after rendering a new doc
const origRender = renderCurrentDoc;
renderCurrentDoc = function() {
  origRender();
  setTimeout(observeSections, 100);
};
</script>
</body>
